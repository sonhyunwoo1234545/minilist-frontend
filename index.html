<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 투두리스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="list-container">
        <h2>나의 미니 투두리스트</h2>
        
        <div class="input-area">
            <input type="text" id="itemInput" placeholder="할 일을 입력하세요">
            <button id="addButton">추가</button>
        </div>

        <div id="filterArea" class="filter-area">
            <button class="filter-btn active" data-filter="all">전체 보기</button>
            <button class="filter-btn" data-filter="done">완료 항목</button>
            <button class="filter-btn" data-filter="active">미완료 항목</button>
        </div>

        <ul id="itemList">
            </ul>
    </div>
    <script src="minilist.js"></script>
</body>
</html>
